{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="{% static 'logsApp/layout.css'%}" rel="stylesheet" />
    <link href="{% static 'logsApp/reg.css'%}" rel="stylesheet" />
    <link href="{% static 'logsApp/logs.css'%}" rel="stylesheet" />
    <link href="{% static 'logsApp/finesstyle.css'%}" rel="stylesheet" />
    <link href="{% static 'logsApp/fiAc.css'%}" rel="stylesheet" />
    <script src="{% static 'logsApp/js/script.js' %}" defer></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      a {
        text-decoration: none;
        color: rgb(255, 255, 255);
        font-weight: bold;
      }
      body {
        padding: 0;
        background-color: #f2f2f2;
      }
      .header-cont {
        padding: 0 30px 0 30px;
        margin: 0;
        display: flex;
        background-color: #fcfbfb;
        justify-content: space-between;
        align-items: center;
        height: 100px;
      }

      img {
        width: 20%;
      }
      .nav-links {
        font-weight: bold;
        list-style: none;
        display: flex;
        gap: 30px;
        text-decoration: none;
      }

      .nav-link-btn-unique {
        font-weight: bold;
        cursor: pointer;
        background-color: #4e6b31;
        color: rgb(255, 255, 255);
        padding: 10px 20px;
        width: 200px;
        height: 50px;
        border: none;
        border-radius: 8px;
        transition: all 0.4s ease-in-out, transform 0.2s ease;
      }

      .nav-link-btn-unique:hover {
        background-color: #b59958;
        transform: translateY(-2px);
      }

      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      input[type="number"] {
        -moz-appearance: textfield;
      }
    </style>

    <title>Document</title>
  </head>
  <body>
    <header class="dd">
      <div class="header-cont">
        <div class="logo-cont">
          <img
            class="logo"
            src="{% static 'logsApp/imgs/sm-logo.png' %}"
            alt=""
          />
        </div>
        <div class="navs-cont">
          <ul class="nav-links">
            {% comment %}
            <li>
              <button
                class="nav-link-btn-unique"
                onclick="window.location='{% url 'logsApp:addNewEmp' %}'"
              >
                اضافة موظف جديد
              </button>
            </li>
            {% endcomment %} {% comment %}
            <li>
              <button
                class="nav-link-btn-unique"
                onclick="window.location='{% url 'logsApp:finec' %}'"
              >
                حصر المخالفات
              </button>
            </li>
            {% endcomment %}
            <li>
              <button
                class="nav-link-btn-unique"
                onclick="window.location='{% url 'logsApp:finesAccidents' %}'"
              >
                سجل المخالفات و الحوادث
              </button>
            </li>
            <li>
              <button
                class="nav-link-btn-unique"
                onclick="window.location='{% url 'logsApp:logslink' %}'"
              >
                سجل الاستلام والتسليم
              </button>
            </li>
            <li>
              <button
                class="nav-link-btn-unique"
                onclick="window.location='{% url 'logsApp:add' %}'"
              >
                استلام و ارجاع المركبه
              </button>
            </li>
          </ul>
        </div>
      </div>
    </header>
    <main>{% block body %} {% endblock %}</main>
    <footer class=""></footer>
  </body>
</html>
